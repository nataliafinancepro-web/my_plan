<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Планировщик задач</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Операционный дашборд</p>
        <h1>Планировщик задач</h1>
        <time class="selected-date" datetime="2026-05-22">22 мая 2026</time>
      </div>
      <button class="button button-secondary today-button" type="button">Сегодня</button>
    </header>

    <div class="dashboard-layout">
      <div class="dashboard-main">
        <section class="panel period-panel" aria-labelledby="period-title">
          <div class="section-heading">
            <h2 id="period-title">Период анализа</h2>
            <span class="muted period-label">Диапазон</span>
          </div>
          <div class="period-filter">
            <label>
              <span>Начало</span>
              <input class="period-start-input" type="date" aria-label="Начало периода">
            </label>
            <label>
              <span>Конец</span>
              <input class="period-end-input" type="date" aria-label="Конец периода">
            </label>
          </div>
          <div class="period-stats" aria-label="Сводка по периоду">
            <div>
              <span class="period-stat-value goals-deadline-count">0</span>
              <span class="period-stat-label">целей</span>
            </div>
            <div>
              <span class="period-stat-value period-total-tasks">0</span>
              <span class="period-stat-label">задач</span>
            </div>
            <div>
              <span class="period-stat-value period-done-tasks">0</span>
              <span class="period-stat-label">выполнено</span>
            </div>
            <div>
              <span class="period-stat-value period-open-tasks">0</span>
              <span class="period-stat-label">не выполнено</span>
            </div>
          </div>
        </section>

        <section class="panel progress-panel" aria-labelledby="progress-title">
          <div class="section-heading">
            <h2 id="progress-title">Прогресс периода</h2>
            <span class="muted progress-percent">0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span class="progress-fill"></span>
          </div>
          <p class="panel-note progress-summary">Прогресс периода: 0% (0 из 0 задач выполнено)</p>
        </section>

        <section class="panel task-panel" aria-labelledby="add-task-title">
          <div class="section-heading">
            <h2 id="add-task-title">Новая задача</h2>
          </div>
          <form class="task-form">
            <input
              class="task-input"
              type="text"
              maxlength="300"
              placeholder="Новая задача..."
              aria-label="Текст новой задачи"
            >
            <input class="task-date-input" type="date" aria-label="Дата задачи">
            <select class="task-select" aria-label="Приоритет задачи">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
            <select class="task-select" aria-label="Повторение задачи">
              <option value="none" selected>None</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
            </select>
            <select class="task-select goal-select" aria-label="Годовая цель">
              <option value="" selected>Без цели</option>
            </select>
            <button class="button button-primary" type="submit">Добавить</button>
          </form>
        </section>

        <section class="panel tasks-current" aria-labelledby="tasks-title">
          <div class="section-heading">
            <h2 id="tasks-title">Задачи за период</h2>
            <span class="muted task-count">0 задач</span>
          </div>
          <div class="task-list" aria-live="polite"></div>
        </section>

        <section class="balance-section" aria-labelledby="balance-title">
          <div class="section-heading">
            <h2 id="balance-title">Цели и Баланс</h2>
            <span class="muted balance-summary">0 сфер</span>
          </div>
          <form class="sphere-form">
            <input
              class="sphere-input"
              type="text"
              maxlength="80"
              placeholder="Новая сфера..."
              aria-label="Название новой сферы"
            >
            <button class="button button-primary" type="submit">Добавить сферу</button>
          </form>
          <div class="spheres-list" aria-live="polite"></div>
        </section>
      </div>

      <aside class="dashboard-sidebar" aria-labelledby="backlog-title">
        <section class="panel backlog-panel">
          <div class="section-heading">
            <h2 id="backlog-title">Просроченные задачи</h2>
            <span class="backlog-badge" aria-label="Просроченные задачи" hidden>0</span>
          </div>
          <div class="backlog" id="backlog"></div>
        </section>
      </aside>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
